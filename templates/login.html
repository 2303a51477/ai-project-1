<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumPix - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
        }

        /* Animated Camera Background */
        .camera-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .camera-icon {
            position: absolute;
            font-size: 3rem;
            opacity: 0.1;
            animation: floatCamera 20s infinite linear;
        }

        @keyframes floatCamera {
            0% {
                transform: translateX(-100px) rotate(0deg);
            }
            100% {
                transform: translateX(100vw) rotate(360deg);
            }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .camera-loader {
            position: relative;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        .camera-loader::before {
            content: '📷';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            animation: rotateLens 1s linear infinite;
        }

        .camera-loader::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 3px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: lensZoom 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(102,126,234,0.5);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 40px rgba(102,126,234,0.8);
            }
        }

        @keyframes rotateLens {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes lensZoom {
            0%, 100% {
                width: 40px;
                height: 40px;
                opacity: 1;
            }
            50% {
                width: 60px;
                height: 60px;
                opacity: 0.5;
            }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 1.2rem;
            animation: fadeInOut 1.5s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Login Card */
        .login-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .camera-logo {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .camera-logo i {
            font-size: 4rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rotateCamera 3s ease-in-out infinite;
        }

        @keyframes rotateCamera {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(10deg);
            }
            75% {
                transform: rotate(-10deg);
            }
        }

        .camera-logo h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 10px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group-custom i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.2rem;
            z-index: 1;
        }

        .input-group-custom input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .input-group-custom input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #764ba2;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: floatParticle 10s infinite linear;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 30px;
                margin: 20px;
            }
            
            .camera-logo i {
                font-size: 3rem;
            }
            
            .camera-logo h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Camera Background -->
    <div class="camera-bg" id="cameraBg"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="camera-loader"></div>
        <div class="loading-text">Capturing your moment...</div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <div class="camera-logo">
                <i class="fas fa-camera-retro"></i>
                <h2>QuantumPix</h2>
                <p class="text-muted">Capture your perfect moments</p>
            </div>

            <form id="loginForm" method="POST">
                <div class="input-group-custom">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="input-group-custom">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="register-link">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script>
        // Create animated camera icons in background
        const cameraBg = document.getElementById('cameraBg');
        const cameras = ['📷', '🎥', '📸', '🎬', '📹'];
        
        for (let i = 0; i < 20; i++) {
            const camera = document.createElement('div');
            camera.className = 'camera-icon';
            camera.innerHTML = cameras[Math.floor(Math.random() * cameras.length)];
            camera.style.left = Math.random() * 100 + '%';
            camera.style.animationDelay = Math.random() * 20 + 's';
            camera.style.animationDuration = 15 + Math.random() * 10 + 's';
            camera.style.fontSize = (1 + Math.random() * 3) + 'rem';
            cameraBg.appendChild(camera);
        }

        // Create floating particles
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = 5 + Math.random() * 10 + 's';
            document.body.appendChild(particle);
        }

        // Loading animation on form submit
        const loginForm = document.getElementById('loginForm');
        const loadingOverlay = document.getElementById('loadingOverlay');

        loginForm.addEventListener('submit', function(e) {
            loadingOverlay.style.display = 'flex';
            setTimeout(() => {
                // Form will submit naturally
            }, 100);
        });

        // Flash messages animation
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    const flashMsg = document.createElement('div');
                    flashMsg.className = 'alert alert-{{ category }}';
                    flashMsg.innerHTML = '{{ message }}';
                    flashMsg.style.position = 'fixed';
                    flashMsg.style.top = '20px';
                    flashMsg.style.right = '20px';
                    flashMsg.style.zIndex = '10000';
                    flashMsg.style.animation = 'slideUp 0.5s ease';
                    document.body.appendChild(flashMsg);
                    setTimeout(() => flashMsg.remove(), 3000);
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
</body>
</html>
